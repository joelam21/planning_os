name: dbt-ci

on:
  pull_request:
    branches: [dev]
  workflow_dispatch:

jobs:
  dbt-parse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify dbt install
        run: dbt --version

      - name: Create dummy env vars for profile resolution
        run: |
          cat >> $GITHUB_ENV << 'EOF'
          DBT_ACCOUNT=dummy_account
          DBT_USER=dummy_user
          DBT_PASSWORD=dummy_password
          DBT_ROLE=dummy_role
          DBT_DATABASE=PLANNING_OS
          DBT_DEV_SCHEMA=DEV
          DBT_SCHEMA=DEV
          DBT_WAREHOUSE=dummy_wh
          SNOWFLAKE_ACCOUNT=dummy_account
          EOF

      - name: Parse project
        run: dbt parse
