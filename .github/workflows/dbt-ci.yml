name: dbt CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
  workflow_dispatch: # manual trigger from GitHub Actions UI

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    env:
      DBT_ACCOUNT: ${{ secrets.DBT_ACCOUNT }}
      DBT_CI_ROLE: ${{ secrets.DBT_CI_ROLE }}
      DBT_CI_SCHEMA: ${{ secrets.DBT_CI_SCHEMA }}
      DBT_DATABASE: ${{ secrets.DBT_DATABASE }}
      DBT_USER: ${{ secrets.DBT_USER }}
      DBT_PASSWORD: ${{ secrets.DBT_PASSWORD }}
      DBT_WAREHOUSE: ${{ secrets.DBT_WAREHOUSE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Validate required dbt secrets
        run: |
          set -euo pipefail
          required_vars=(
            DBT_ACCOUNT
            DBT_CI_ROLE
            DBT_CI_SCHEMA
            DBT_DATABASE
            DBT_USER
            DBT_PASSWORD
            DBT_WAREHOUSE
          )

          missing=()
          for var in "${required_vars[@]}"; do
            if [ -z "${!var:-}" ]; then
              missing+=("$var")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required GitHub secrets: ${missing[*]}"
            exit 1
          fi

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: dbt debug
        working-directory: dbt
        run: dbt debug --target ci

      - name: dbt build — staging layer
        working-directory: dbt
        run: |
          dbt build \
            --select staging \
            --target ci

      - name: dbt build — intermediate layer
        working-directory: dbt
        run: |
          dbt build \
            --select int \
            --target ci

      - name: dbt build — marts layer
        working-directory: dbt
        run: |
          dbt build \
            --select marts \
            --target ci

      - name: dbt test — singular tests
        working-directory: dbt
        run: |
          dbt test \
            --select test_type:singular \
            --target ci

      - name: dbt source freshness
        working-directory: dbt
        run: |
          dbt source freshness \
            --target ci
        continue-on-error: true
