version: 2

models:
  - name: stg_iowa_liquor
    description: "Cleaned and typed staging model for Iowa liquor sales data. This layer preserves source row shape and does not enforce invoice-level uniqueness."
    columns:
      - name: invoice_item_number
        description: "Invoice line identifier from the Iowa liquor source; duplicate values are monitored and resolved downstream."
        tests:
          - not_null

      - name: order_date
        description: "Transaction date from the raw source."
        tests:
          - not_null

      - name: store_number
        description: "Store identifier from the source system."
        tests:
          - not_null

      - name: item_number
        description: "Product/item identifier from the source system."
        tests:
          - not_null

      - name: sale_dollars
        description: "Total sale amount in USD."
        tests:
          - not_null

      - name: bottles_sold
        description: "Number of bottles sold in the transaction."
        tests:
          - not_null
