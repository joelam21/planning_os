version: 2

models:
  - name: dim_store
    description: "Current-state Type 1 store dimension (one row per store_number), derived from snap_store."
    columns:
      - name: store_number
        description: "{{ doc('store_number') }}"
        tests:
          - not_null
          - unique

  - name: dim_item
    description: "Current-state Type 1 item dimension (one row per item_number), derived from snap_item."
    columns:
      - name: item_number
        description: "{{ doc('item_number') }}"
        tests:
          - not_null
          - unique

      - name: category_family
        description: "Broad category family mapped from category/category_name (for example Whiskies, Vodkas, Tequilas)."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Whiskies
                  - Tequilas
                  - Vodkas
                  - Brandies
                  - Rum
                  - Gin
                  - Liqueurs
                  - RTD/Cocktails
                  - Specialty/Other Spirits
                  - Other

  - name: dim_item_business_history
    description: "Business-effective item history with historical pricing and strategy labels, built from the intermediate order-date history model."
    columns:
      - name: item_number
        description: "{{ doc('item_number') }}"
        tests:
          - not_null

      - name: category_family
        description: "Broad category family mapped from category/category_name for historical versions."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Whiskies
                  - Tequilas
                  - Vodkas
                  - Brandies
                  - Rum
                  - Gin
                  - Liqueurs
                  - RTD/Cocktails
                  - Specialty/Other Spirits
                  - Other

      - name: business_valid_from
        description: "Business date when this attribute version first appears."
        tests:
          - not_null

      - name: business_valid_to
        description: "Business date when this version ends (day before next change); null means current."

      - name: is_current
        description: "True when business_valid_to is null."

      - name: price_per_100ml
        description: "Historical retail price normalized to 100ml for cross-size comparison."

      - name: effective_bottle_volume_ml
        description: "Bottle volume used for price normalization; 700ml formats are normalized to 750ml."

      - name: is_bundle_pack
        description: "True when item_description suggests a multipack, tray pack, gift set, sampler, or similar bundle."
        tests:
          - not_null

      - name: package_size_tier
        description: "Analyst-facing package size class based on bottle volume."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - unknown
                  - micro_trial
                  - mini_trial
                  - large_trial
                  - half_size
                  - standard
                  - jumbo_value

      - name: retail_price_tier
        description: "Historical bottle-retail price band used for broad price positioning."
        tests:
          - not_null

      - name: price_per_100ml_tier
        description: "Historical normalized price band based on price_per_100ml."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - unknown
                  - bundle_unknown
                  - 0_to_2
                  - 2_to_4
                  - 4_to_6
                  - 6_to_8
                  - 8_to_12
                  - 12_to_20
                  - 20_plus

      - name: normalized_price_tier
        description: "Analyst-friendly alias for price_per_100ml_tier."
        tests:
          - not_null

      - name: price_position_segment
        description: "Analyst-facing strategic price segment derived from bottle price and normalized price."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - unknown
                  - bundle_pack
                  - trial_value
                  - trial_premium
                  - trial_luxury
                  - high_volume
                  - budget
                  - standard
                  - other
                  - premium
                  - premium_bulk
                  - super_premium
                  - ultra_premium
                  - luxury
                  - icon_collectible
                  - value_oversized

  - name: fct_liquor_sales
    description: "Atomic fact table at invoice line grain (one row per invoice_item_number)."
    columns:
      - name: invoice_item_number
        description: "{{ doc('invoice_item_number') }}"
        tests:
          - not_null
          - unique

      - name: order_date
        description: "{{ doc('order_date') }}"

      - name: store_number
        description: "{{ doc('store_number') }}"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_store')
                field: store_number

      - name: item_number
        description: "{{ doc('item_number') }}"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_item')
                field: item_number

      - name: sale_dollars
        description: "{{ doc('sale_dollars') }}"

      - name: bottles_sold
        description: "{{ doc('bottles_sold') }}"

      - name: loaded_at
        description: "{{ doc('loaded_at') }}"

  - name: fct_store_daily_sales
    description: "Store-day aggregate fact table at (order_date, store_number) grain, summing sales, volume, cost, and gross profit from invoice-line facts. Enables chain/channel productivity benchmarking and store-level daily trend analysis without re-aggregating atomic rows."
    columns:
      - name: order_date
        description: "Calendar date for the aggregated store-day record."
        tests:
          - not_null

      - name: store_number
        description: "Store identifier for the aggregated store-day record."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_store')
                field: store_number

      - name: total_sales_dollars
        description: "Total sale_dollars summed across all invoice lines for the store and date."

      - name: total_bottles_sold
        description: "Total bottles_sold summed across all invoice lines for the store and date."

      - name: total_estimated_gross_profit
        description: "Total estimated gross profit summed across all invoice lines for the store and date."

      - name: invoice_line_count
        description: "Count of invoice lines contributing to the store-day aggregate."

  - name: fct_sku_velocity
    description: "Trailing-12-week SKU Pareto classification model."
    columns:
      - name: item_number
        description: "{{ doc('item_number') }}"
        tests:
          - not_null
          - unique

      - name: sku_tier_volume
        description: "Pareto tier based on cumulative unit contribution."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - "Tier 1: Core (Top 80% Volume)"
                  - "Tier 2: Niche (Next 15% Volume)"
                  - "Tier 3: Zombie (Bottom 5% Volume)"

      - name: sku_tier_revenue
        description: "Pareto tier based on cumulative revenue contribution."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - "Tier 1: Core (Top 80% Revenue)"
                  - "Tier 2: Niche (Next 15% Revenue)"
                  - "Tier 3: Zombie (Bottom 5% Revenue)"

      - name: cumulative_volume_pct
        description: "Running cumulative share of units."
        tests:
          - not_null

      - name: cumulative_revenue_pct
        description: "Running cumulative share of revenue."
        tests:
          - not_null

  - name: fct_replenishment_forecast
    description: "Weekly baseline shipping forecast per active SKU using trailing 4-week and 8-week depletion averages."
    columns:
      - name: item_number
        description: "{{ doc('item_number') }}"
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('dim_item')
                field: item_number

      - name: item_description
        description: "Current item description from dim_item."

      - name: category_name
        description: "Current item category name from dim_item."

      - name: trailing_4wk_avg_units
        description: "Average weekly units sold across the most recent 4 full weeks."
        tests:
          - not_null

      - name: trailing_8wk_avg_units
        description: "Average weekly units sold across the most recent 8 full weeks."
        tests:
          - not_null

      - name: selected_baseline_units
        description: "Greater of trailing_4wk_avg_units and trailing_8wk_avg_units."
        tests:
          - not_null

      - name: recommended_ship_qty
        description: "Rounded baseline forecast with 20% safety buffer applied."
        tests:
          - not_null
